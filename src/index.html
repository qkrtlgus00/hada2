<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하다 — 할 일 & 메모</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="logo">하다 <span class="logo-sub">할 일 &amp; 메모</span></h1>
    <button id="theme-toggle" class="icon-btn" title="라이트/다크 전환" aria-label="테마 전환">🌙</button>
  </header>

  <main class="container">
    <!-- 입력 영역 -->
    <form id="add-form" class="add-form" autocomplete="off">
      <input id="title-input" class="title-input" type="text"
             placeholder="할 일을 입력하세요…" maxlength="200" required />
      <input id="due-input" class="due-input" type="date" title="마감일" />
      <input id="tags-input" class="tags-input" type="text"
             placeholder="태그 (쉼표로 구분)" maxlength="100" />
      <button type="submit" class="add-btn">추가</button>
    </form>

    <!-- 필터/검색 바 -->
    <div class="toolbar">
      <div class="filters" id="status-filters">
        <button class="chip active" data-filter="all">전체</button>
        <button class="chip" data-filter="active">진행중</button>
        <button class="chip" data-filter="done">완료</button>
      </div>
      <input id="search-input" class="search-input" type="search"
             placeholder="🔍 검색 (제목·메모)" />
    </div>

    <!-- 태그 필터 -->
    <div class="tag-filters" id="tag-filters"></div>

    <!-- 통계 -->
    <div class="stats" id="stats"></div>

    <!-- 할 일 목록 -->
    <ul id="task-list" class="task-list"></ul>

    <!-- 비어 있을 때 -->
    <div id="empty-state" class="empty-state" hidden>
      <p>아직 할 일이 없어요. 위에 첫 할 일을 추가해 보세요! ✍️</p>
    </div>
  </main>

  <template id="task-template">
    <li class="task-item">
      <div class="task-main">
        <input type="checkbox" class="task-check" />
        <div class="task-body">
          <div class="task-title-row">
            <span class="task-title"></span>
            <input class="task-title-edit" type="text" hidden maxlength="200" />
          </div>
          <div class="task-meta">
            <span class="task-due"></span>
            <span class="task-tags"></span>
          </div>
        </div>
        <div class="task-actions">
          <button class="mini-btn note-btn" title="메모">📝</button>
          <button class="mini-btn edit-btn" title="수정">✏️</button>
          <button class="mini-btn del-btn" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="task-notes" hidden>
        <textarea class="notes-area" placeholder="메모를 입력하세요…"></textarea>
      </div>
    </li>
  </template>

  <script src="renderer.js"></script>
</body>
</html>
